name: civic_voice_interface
description: Civic Voice Interface — A voice-first decision-intelligence system for government service navigation in Bharat.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management & Routing
  provider: ^6.1.2
  go_router: ^13.2.0

  # Voice & Language
  speech_to_text: ^6.6.0
  flutter_tts: ^3.8.3
  google_mlkit_translation: ^0.11.0

  # Backend
  supabase_flutter: ^2.3.4
  shared_preferences: ^2.2.3
  http: ^1.1.0
  flutter_dotenv: ^5.1.0

  # Animations & UI
  lottie: ^3.1.0
  flutter_animate: ^4.5.0
  animate_do: ^3.3.4
  animated_text_kit: ^4.2.2
  shimmer: ^3.0.0
  confetti: ^0.7.0

  # Visual Effects
  glassmorphism: ^3.0.0

  # Design & Icons
  google_fonts: ^6.1.0
  font_awesome_flutter: ^10.5.0

  # Charts & Data Viz
  fl_chart: ^0.68.0

  # Permissions & Device
  permission_handler: ^11.3.1
  geolocator: ^10.1.0
  connectivity_plus: ^5.0.0

  # Media
  record: ^6.1.2
  audioplayers: ^6.5.1
  image_picker: ^1.0.7
  image: ^4.1.3
  file_picker: ^8.1.3

  # Utilities
  url_launcher: ^6.2.6
  webview_flutter: ^4.4.0
  flutter_local_notifications: ^17.1.2
  path_provider: ^2.1.5
  intl: ^0.19.0
  countup: ^0.1.3

  timezone: any

  # Security (Document Vault)
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.8
  flutter_image_compress: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/lottie/
    - assets/images/
    - assets/icons/
    - assets/data/
    - assets/flag/flag.html

  # Fonts are loaded via the google_fonts package (no local font files needed)
